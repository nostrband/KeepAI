name: Build desktop apps

on:
  push:
    tags:
      - 'v*'
    branches:
      - 'main'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    environment: production
    env:
      NODE_OPTIONS: --max_old_space_size=4096
      BUILD_GMAIL_SECRET: ${{ secrets.BUILD_GMAIL_SECRET }}
      BUILD_POSTHOG_TOKEN: ${{ secrets.BUILD_POSTHOG_TOKEN }}
      BUILD_POSTHOG_HOST: ${{ secrets.BUILD_POSTHOG_HOST }}
      BUILD_POSTHOG_API_HOST: ${{ secrets.BUILD_POSTHOG_API_HOST }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            build_target: -l
            arch: x64
          - os: windows-latest
            build_target: -w
            arch: x64
          - os: macos-latest
            build_target: -m
            arch: universal

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build all packages
        run: npx turbo run build --filter=@keepai/electron

      - name: Rebuild better-sqlite3 for Electron
        run: node apps/electron/scripts/rebuild-native.mjs
        env:
          ARCH: ${{ matrix.arch }}

      - name: Import macOS signing certificate
        if: runner.os == 'macOS'
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          echo "$CSC_LINK" | base64 --decode > certificate.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import certificate.p12 -k build.keychain -P "$CSC_KEY_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions build.keychain
          rm certificate.p12

      - name: Build distributables with electron-builder
        run: |
          npx electron-builder ${{ matrix.build_target }} --${{ matrix.arch }} --publish=onTag
          npx rimraf --glob "apps/electron/release/*-unpacked" "apps/electron/release/mac-*"
        env:
          CSC_LINK: ${{ runner.os == 'macOS' && secrets.CSC_LINK || '' }}
          CSC_KEY_PASSWORD: ${{ runner.os == 'macOS' && secrets.CSC_KEY_PASSWORD || '' }}
          APPLE_ID: ${{ runner.os == 'macOS' && secrets.APPLE_ID || '' }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ runner.os == 'macOS' && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ runner.os == 'macOS' && secrets.APPLE_TEAM_ID || '' }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ runner.os == 'Windows' && 'false' || '' }}
          AZURE_TENANT_ID: ${{ runner.os == 'Windows' && secrets.AZURE_TENANT_ID || '' }}
          AZURE_CLIENT_ID: ${{ runner.os == 'Windows' && secrets.AZURE_CLIENT_ID || '' }}
          AZURE_CLIENT_SECRET: ${{ runner.os == 'Windows' && secrets.AZURE_CLIENT_SECRET || '' }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: apps/electron/release/**
