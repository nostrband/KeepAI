appId: ai.keepai.app
productName: KeepAI
directories:
  app: .
  output: apps/electron/release
  buildResources: apps/electron/build

files:
  - package.json
  - node_modules/**
  - apps/electron/dist/**
  - apps/electron/public/**
  - apps/electron/build/**

asarUnpack:
  - "node_modules/better-sqlite3/**"
  - "node_modules/bindings/**"
  - "node_modules/file-uri-to-path/**"

extraMetadata:
  main: apps/electron/dist/main.cjs

npmRebuild: true
asar: true

win:
  target:
    - portable
  icon: apps/electron/build/icon.png

publish:
  provider: github
  owner: nostrband
  repo: KeepAI

mac:
  target:
    - dmg
    - zip
  icon: apps/electron/build/icon.png
  hardenedRuntime: true
  gatekeeperAssess: false
  notarize: true

linux:
  target:
    - AppImage
  icon: apps/electron/build/icon.png
