appId: ai.keepai.app
productName: KeepAI
directories:
  app: .
  output: apps/electron/release
  buildResources: apps/electron/build

files:
  - package.json
  - node_modules/**
  - apps/electron/dist/**
  - apps/electron/public/**
  - apps/electron/build/**

asarUnpack:
  - "node_modules/better-sqlite3/**"
  - "node_modules/bindings/**"
  - "node_modules/file-uri-to-path/**"

extraResources:
  - from: "apps/electron/build"
    to: "icons"
    filter:
      - "icon.png"
      - "icon.ico"
      - "tray-icon*.png"
      - "tray-icon.ico"

extraMetadata:
  main: apps/electron/dist/main.cjs
  productName: KeepAI

npmRebuild: true
asar: true

win:
  target:
    - nsis
  icon: apps/electron/build/icon.png
  azureSignOptions:
    publisherName: "NostrCorp, Inc."
    endpoint: "https://eus.codesigning.azure.net/"
    codeSigningAccountName: "NostrCorp"
    certificateProfileName: "KeepAI"

publish:
  provider: github
  owner: nostrband
  repo: KeepAI

mac:
  target:
    - dmg
    - zip
  icon: apps/electron/build/icon.png
  hardenedRuntime: true
  gatekeeperAssess: false
  notarize: true

linux:
  target:
    - AppImage
  icon: apps/electron/build/icon.png
